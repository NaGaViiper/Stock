<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Provisions — Gestion des stocks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<style>
:root {
  --bg:#f5f0e8;--bg2:#ede7d9;--card:#faf8f3;--ink:#1c1a15;--ink2:#6b6455;--ink3:#9e9282;
  --accent:#b85c2c;--accent2:#d4882e;--green:#3a7d4b;--red:#c0392b;--yellow:#d4a017;
  --border:#d9d0be;--shadow:rgba(28,26,21,0.10);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;padding-bottom:80px}

/* HEADER */
header{background:var(--ink);color:var(--bg);padding:28px 40px 24px;display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap}
header h1{font-family:'Playfair Display',serif;font-size:clamp(26px,4vw,40px);letter-spacing:-.5px;line-height:1}
header h1 span{font-style:italic;color:var(--accent2)}
.header-sub{font-size:12px;color:var(--ink3);letter-spacing:2px;text-transform:uppercase;margin-top:4px}
.header-stats{display:flex;gap:24px;flex-wrap:wrap}
.stat-pill{text-align:center}
.stat-pill .val{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;color:var(--accent2)}
.stat-pill .lbl{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3);margin-top:2px}

/* TOOLBAR */
.toolbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 40px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:180px;max-width:320px}
.search-wrap input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px 12px 9px 36px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink);outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--accent)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--ink3);font-size:15px;pointer-events:none}
.filter-pills{display:flex;gap:6px;flex-wrap:wrap}
.pill{padding:6px 14px;border-radius:99px;border:1px solid var(--border);background:transparent;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink2);cursor:pointer;transition:all .15s;white-space:nowrap}
.pill:hover{border-color:var(--accent);color:var(--accent)}
.pill.active{background:var(--accent);border-color:var(--accent);color:#fff}
.sort-select{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink);cursor:pointer;outline:none}
.btn-add{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 18px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .15s,transform .1s}
.btn-add:hover{background:#9f4d23;transform:translateY(-1px)}
.btn-scan{background:var(--ink);color:var(--accent2);border:1px solid #333;border-radius:8px;padding:9px 16px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .15s}
.btn-scan:hover{background:#2e2b24}

/* MAIN */
main{padding:28px 40px}
.alerts{margin-bottom:24px;display:flex;flex-direction:column;gap:8px}
.alert-bar{background:#fef3e2;border:1px solid #f0c97a;border-radius:8px;padding:10px 16px;font-size:13px;color:#8a5a00;display:flex;align-items:flex-start;gap:8px}
.alert-bar.critical{background:#fdecea;border-color:#f0aaaa;color:#8a1c1c}
.alert-bar.peremption{background:#fce4ec;border-color:#f48fb1;color:#880e4f}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}

/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px 14px;position:relative;transition:box-shadow .2s,transform .2s;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--bar-color,var(--green));border-radius:14px 14px 0 0}
.card:hover{box-shadow:0 6px 24px var(--shadow);transform:translateY(-2px)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px}
.card-emoji{font-size:26px;line-height:1}
.card-actions{display:flex;gap:4px}
.icon-btn{background:none;border:none;cursor:pointer;padding:4px 6px;border-radius:6px;font-size:15px;color:var(--ink3);transition:background .15s,color .15s}
.icon-btn:hover{background:var(--bg2);color:var(--ink)}
.icon-btn.del:hover{color:var(--red)}
.card-name{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;line-height:1.2;margin-bottom:3px}
.card-cat{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3);margin-bottom:6px}
.card-barcode{font-size:10px;color:var(--ink3);font-family:'DM Mono',monospace;margin-bottom:8px}

/* PEREMPTION ROW */
.perm-row{display:flex;align-items:center;gap:6px;margin-bottom:10px;font-size:12px;padding:5px 10px;border-radius:8px;background:var(--bg2)}
.perm-row.ok{background:#e6f4ea;color:var(--green)}
.perm-row.soon{background:#fff3e0;color:#b85c00}
.perm-row.expired{background:#fdecea;color:var(--red);font-weight:600}
.perm-row .perm-icon{font-size:14px;flex-shrink:0}
.perm-row .perm-txt{flex:1}
.perm-row .perm-days{font-family:'DM Mono',monospace;font-weight:600;font-size:11px;white-space:nowrap}

/* BAR */
.bar-wrap{margin-bottom:10px}
.bar-bg{height:6px;background:var(--bg2);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;background:var(--bar-color,var(--green));transition:width .4s cubic-bezier(.4,0,.2,1)}
.bar-labels{display:flex;justify-content:space-between;margin-top:5px;font-size:12px;color:var(--ink3)}
.bar-labels .qty{font-family:'DM Mono',monospace;font-weight:500;font-size:13px;color:var(--ink)}

/* STOCK CTRL */
.stock-ctrl{display:flex;align-items:center;gap:8px;margin-top:8px}
.ctrl-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--ink);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,border-color .15s;line-height:1;flex-shrink:0}
.ctrl-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.qty-display{font-family:'DM Mono',monospace;font-size:16px;font-weight:500;min-width:50px;text-align:center}
.qty-unit{font-size:11px;color:var(--ink3);margin-top:1px}
.badge{margin-left:auto;font-size:11px;padding:3px 10px;border-radius:99px;font-weight:500}
.badge.ok{background:#e6f4ea;color:var(--green)}
.badge.low{background:#fff3e0;color:#b85c00}
.badge.empty{background:#fdecea;color:var(--red)}

/* SHOPPING PANEL */
.shopping-panel{position:fixed;bottom:0;left:0;right:0;background:var(--ink);color:var(--bg);transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);z-index:100;max-height:55vh;border-radius:20px 20px 0 0;overflow:hidden;display:flex;flex-direction:column}
.shopping-panel.open{transform:translateY(0)}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:18px 24px 12px;border-bottom:1px solid rgba(255,255,255,.1);flex-shrink:0}
.panel-header h2{font-family:'Playfair Display',serif;font-size:20px}
.panel-header h2 span{color:var(--accent2);font-style:italic}
.panel-close{background:rgba(255,255,255,.1);border:none;border-radius:8px;color:var(--bg);font-size:18px;padding:4px 10px;cursor:pointer}
.panel-body{overflow-y:auto;padding:16px 24px;flex:1;display:flex;flex-direction:column;gap:8px}
.shop-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:rgba(255,255,255,.06);border-radius:10px;font-size:14px}
.shop-item .emoji{font-size:18px}
.shop-item .name{flex:1}
.shop-item .need{font-family:'DM Mono',monospace;font-size:13px;color:var(--accent2)}
.shop-item input[type=checkbox]{width:16px;height:16px;cursor:pointer}
.shop-empty{color:var(--ink3);font-style:italic;text-align:center;padding:20px}
.fab-shop{position:fixed;bottom:24px;right:28px;background:var(--accent);color:#fff;border:none;border-radius:99px;padding:13px 22px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;box-shadow:0 4px 20px rgba(184,92,44,.4);display:flex;align-items:center;gap:8px;transition:background .15s,transform .15s;z-index:50}
.fab-shop:hover{background:#9f4d23;transform:translateY(-2px)}
.fab-badge{background:#fff;color:var(--accent);border-radius:99px;font-size:12px;font-weight:700;padding:0 6px;min-width:20px;text-align:center}

/* SCANNER OVERLAY */
.scanner-overlay{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;padding:20px}
.scanner-overlay.open{opacity:1;pointer-events:all}
.scanner-box{position:relative;width:min(380px,90vw);background:#000;border-radius:16px;overflow:hidden;border:2px solid rgba(255,255,255,.1)}
#scanner-viewport{width:100%;aspect-ratio:4/3;position:relative;background:#111}
#scanner-viewport video{width:100%;height:100%;object-fit:cover;display:block}
#scanner-viewport canvas.drawingBuffer{position:absolute;top:0;left:0;width:100% !important;height:100% !important}
.corner{position:absolute;width:36px;height:36px;border-color:var(--accent2);border-style:solid}
.corner.tl{top:14px;left:14px;border-width:3px 0 0 3px;border-radius:4px 0 0 0}
.corner.tr{top:14px;right:14px;border-width:3px 3px 0 0;border-radius:0 4px 0 0}
.corner.bl{bottom:14px;left:14px;border-width:0 0 3px 3px;border-radius:0 0 0 4px}
.corner.br{bottom:14px;right:14px;border-width:0 3px 3px 0;border-radius:0 0 4px 0}
.scan-line{position:absolute;left:8%;right:8%;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:scanmove 1.8s ease-in-out infinite;top:50%}
@keyframes scanmove{0%,100%{top:25%}50%{top:75%}}
.scanner-status{color:#fff;font-size:14px;text-align:center;margin-top:18px;padding:12px 20px;background:rgba(255,255,255,.08);border-radius:10px;max-width:380px;line-height:1.5}
.scanner-status.found{background:rgba(58,125,75,.35);color:#a8e6bb}
.scanner-status.notfound{background:rgba(192,57,43,.3);color:#f5a9a3}
.scanner-controls{display:flex;gap:12px;margin-top:16px;flex-wrap:wrap;justify-content:center}
.btn-sc-close{padding:10px 22px;border-radius:8px;border:1px solid rgba(255,255,255,.25);background:transparent;color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer}
.btn-sc-manual{padding:10px 22px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(28,26,21,.55);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--card);border-radius:18px;padding:32px;width:100%;max-width:500px;box-shadow:0 20px 60px rgba(28,26,21,.25);transform:translateY(20px);transition:transform .25s;max-height:92vh;overflow-y:auto}
.modal-overlay.open .modal{transform:translateY(0)}
.modal h2{font-family:'Playfair Display',serif;font-size:22px;margin-bottom:20px;color:var(--ink)}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--ink2);margin-bottom:5px}
.field input,.field select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink);outline:none;transition:border-color .2s}
.field input:focus,.field select:focus{border-color:var(--accent)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.section-divider{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--ink3);border-top:1px solid var(--border);padding-top:14px;margin:6px 0 14px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:22px}
.btn-cancel{padding:9px 18px;border-radius:8px;border:1px solid var(--border);background:transparent;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink2);cursor:pointer}
.btn-save{padding:9px 22px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:background .15s}
.btn-save:hover{background:#9f4d23}
.prefill-banner{background:#e8f5e9;border:1px solid #a5d6a7;border-radius:10px;padding:12px 16px;margin-bottom:18px;display:none;gap:10px;align-items:flex-start}
.prefill-banner.show{display:flex}
.pf-icon{font-size:22px;flex-shrink:0}
.pf-name{font-weight:600;font-size:14px;color:#2e7d32}
.pf-brand{font-size:12px;color:#388e3c;margin-top:2px}

.empty-state{text-align:center;padding:60px 20px;color:var(--ink3);grid-column:1/-1}
.empty-state .big{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:15px}

@media(max-width:600px){
  header,.toolbar,main{padding-left:20px;padding-right:20px}
  .modal{padding:24px 20px}
  .row3{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<header>
  <div>
    <h1>Pro<span>visions</span></h1>
    <div class="header-sub">Gestion des stocks de courses</div>
  </div>
  <div class="header-stats">
    <div class="stat-pill"><div class="val" id="stat-total">0</div><div class="lbl">Articles</div></div>
    <div class="stat-pill"><div class="val" id="stat-low">0</div><div class="lbl">Stock bas</div></div>
    <div class="stat-pill"><div class="val" id="stat-empty">0</div><div class="lbl">Épuisés</div></div>
    <div class="stat-pill"><div class="val" id="stat-perm">0</div><div class="lbl">Périment bientôt</div></div>
  </div>
</header>

<div class="toolbar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Rechercher un article…">
  </div>
  <div class="filter-pills" id="filterPills"></div>
  <select class="sort-select" id="sortSelect">
    <option value="name">A → Z</option>
    <option value="qty_asc">Quantité ↑</option>
    <option value="qty_desc">Quantité ↓</option>
    <option value="status">Statut critique</option>
    <option value="expiry">Péremption proche</option>
  </select>
  <button class="btn-scan" onclick="openScanner()">📷 Scanner</button>
  <button class="btn-add" onclick="openModal()">＋ Ajouter</button>
</div>

<main>
  <div class="alerts" id="alertsZone"></div>
  <div class="grid" id="grid"></div>
</main>

<button class="fab-shop" onclick="togglePanel()">
  🛒 Liste de courses <span class="fab-badge" id="fabBadge">0</span>
</button>

<!-- SHOPPING PANEL -->
<div class="shopping-panel" id="shoppingPanel">
  <div class="panel-header">
    <h2>Liste de <span>courses</span></h2>
    <div style="display:flex;gap:8px">
      <button class="panel-close" onclick="exportList()" title="Copier">📋</button>
      <button class="panel-close" onclick="togglePanel()">✕</button>
    </div>
  </div>
  <div class="panel-body" id="panelBody"></div>
</div>

<!-- SCANNER -->
<div class="scanner-overlay" id="scannerOverlay">
  <div class="scanner-box">
    <div id="scanner-viewport">
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
      <div class="scan-line"></div>
    </div>
  </div>
  <div class="scanner-status" id="scannerStatus">📷 Pointez la caméra vers un code-barres…</div>
  <div class="scanner-controls">
    <button class="btn-sc-close" onclick="closeScanner()">✕ Fermer</button>
    <button class="btn-sc-manual" onclick="manualBarcode()">⌨ Saisir le code</button>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Nouvel article</h2>
    <div class="prefill-banner" id="prefillBanner">
      <div class="pf-icon" id="pfIcon">📦</div>
      <div><div class="pf-name" id="pfName"></div><div class="pf-brand" id="pfBrand"></div></div>
    </div>
    <div class="field"><label>Nom de l'article</label><input type="text" id="fName" placeholder="Ex : Lait demi-écrémé"></div>
    <div class="row2">
      <div class="field"><label>Emoji</label><input type="text" id="fEmoji" placeholder="🥛" maxlength="4"></div>
      <div class="field"><label>Catégorie</label>
        <select id="fCat">
          <option>Épicerie</option><option>Produits laitiers</option><option>Fruits & Légumes</option>
          <option>Viandes & Poissons</option><option>Boissons</option><option>Hygiène</option>
          <option>Entretien</option><option>Surgelés</option><option>Boulangerie</option><option>Autre</option>
        </select>
      </div>
    </div>
    <div class="row3">
      <div class="field"><label>Qté actuelle</label><input type="number" id="fQty" min="0" value="1"></div>
      <div class="field"><label>Seuil min</label><input type="number" id="fMin" min="0" value="2"></div>
      <div class="field"><label>Stock max</label><input type="number" id="fMax" min="1" value="6"></div>
    </div>
    <div class="row2">
      <div class="field"><label>Unité</label><input type="text" id="fUnit" placeholder="pcs, L, kg…" value="pcs"></div>
      <div class="field"><label>Code-barres</label><input type="text" id="fBarcode" placeholder="3017620422003"></div>
    </div>
    <div class="section-divider">📅 Date de péremption</div>
    <div class="row2">
      <div class="field"><label>Date limite</label><input type="date" id="fExpiry"></div>
      <div class="field"><label>Type</label>
        <select id="fExpiryType">
          <option value="">— Aucune —</option>
          <option value="DLC">DLC (À consommer avant le)</option>
          <option value="DDM">DDM (De préférence avant le)</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-save" onclick="saveItem()">💾 Enregistrer</button>
    </div>
  </div>
</div>

<script>
var STORAGE_KEY = 'provisions_v2';
var items = [];
var editingId = null;
var activeFilter = 'Tous';
var panelOpen = false;
var scannerRunning = false;
var lastScannedCode = null;

var DEFAULTS = [
  {name:'Lait',emoji:'🥛',cat:'Produits laitiers',qty:2,min:2,max:6,unit:'L',barcode:'',expiry:'',expiryType:'DLC'},
  {name:'Œufs',emoji:'🥚',cat:'Produits laitiers',qty:6,min:6,max:12,unit:'pcs',barcode:'',expiry:'',expiryType:'DLC'},
  {name:'Pain',emoji:'🥖',cat:'Boulangerie',qty:1,min:1,max:3,unit:'pcs',barcode:'',expiry:'',expiryType:'DDM'},
  {name:'Pâtes',emoji:'🍝',cat:'Épicerie',qty:3,min:2,max:6,unit:'pcs',barcode:'',expiry:'',expiryType:'DDM'},
  {name:'Riz',emoji:'🍚',cat:'Épicerie',qty:1,min:1,max:3,unit:'kg',barcode:'',expiry:'',expiryType:'DDM'},
  {name:'Tomates',emoji:'🍅',cat:'Fruits & Légumes',qty:0,min:4,max:8,unit:'pcs',barcode:'',expiry:'',expiryType:'DLC'},
  {name:'Pommes',emoji:'🍎',cat:'Fruits & Légumes',qty:5,min:4,max:8,unit:'pcs',barcode:'',expiry:'',expiryType:'DLC'},
  {name:'Eau minérale',emoji:'💧',cat:'Boissons',qty:4,min:6,max:12,unit:'L',barcode:'',expiry:'',expiryType:'DDM'},
  {name:'Beurre',emoji:'🧈',cat:'Produits laitiers',qty:1,min:1,max:3,unit:'pcs',barcode:'',expiry:'',expiryType:'DLC'},
  {name:'Yaourts',emoji:'🍶',cat:'Produits laitiers',qty:2,min:4,max:8,unit:'pcs',barcode:'',expiry:'',expiryType:'DLC'},
  {name:'Café',emoji:'☕',cat:'Épicerie',qty:1,min:1,max:2,unit:'pcs',barcode:'',expiry:'',expiryType:'DDM'},
  {name:'Gel douche',emoji:'🧴',cat:'Hygiène',qty:2,min:1,max:3,unit:'pcs',barcode:'',expiry:'',expiryType:''},
];

function load() {
  var raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    items = JSON.parse(raw);
    items.forEach(function(it) {
      if (!it.barcode) it.barcode='';
      if (!it.expiry) it.expiry='';
      if (it.expiryType === undefined) it.expiryType='';
    });
  } else {
    items = DEFAULTS.map(function(d,i){ return Object.assign({},d,{id:Date.now()+i}); });
    save();
  }
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); }

// ── PEREMPTION ──
function getExpiryInfo(item) {
  if (!item.expiry) return null;
  var today = new Date(); today.setHours(0,0,0,0);
  var exp = new Date(item.expiry); exp.setHours(0,0,0,0);
  var diff = Math.round((exp-today)/86400000);
  var type = item.expiryType||'DLC';
  if (diff < 0)  return {status:'expired',days:diff,label:'Expiré depuis '+Math.abs(diff)+' j',type:type};
  if (diff === 0) return {status:'expired',days:0,label:"Expire aujourd'hui !",type:type};
  if (diff <= 7)  return {status:'soon',days:diff,label:'Expire dans '+diff+' j',type:type};
  return {status:'ok',days:diff,label:'Périme dans '+diff+' j',type:type};
}
function fmtDate(str) {
  if (!str) return '';
  var p=str.split('-'); return p[2]+'/'+p[1]+'/'+p[0];
}

// ── STOCK STATUS ──
function getStatus(item) {
  if (item.qty===0) return 'empty';
  if (item.qty<=item.min) return 'low';
  return 'ok';
}
function getBarColor(item) {
  var ei=getExpiryInfo(item);
  if (ei && ei.status==='expired') return '#c0392b';
  if (ei && ei.status==='soon') return '#d4a017';
  var s=getStatus(item);
  if (s==='empty') return '#c0392b';
  if (s==='low') return '#d4a017';
  return '#3a7d4b';
}
function getBarPct(item) {
  return Math.min(100,Math.round((item.qty/Math.max(item.max,item.qty))*100));
}
function getBadge(item) {
  var s=getStatus(item);
  if (s==='empty') return '<span class="badge empty">Épuisé</span>';
  if (s==='low')   return '<span class="badge low">Stock bas</span>';
  return '<span class="badge ok">OK</span>';
}

// ── RENDER ──
function getCategories() {
  var cats=['Tous'];
  items.forEach(function(it){ if (cats.indexOf(it.cat)===-1) cats.push(it.cat); });
  return cats;
}
function renderPills() {
  document.getElementById('filterPills').innerHTML = getCategories().map(function(c){
    return '<button class="pill'+(c===activeFilter?' active':'')+'" onclick="setFilter(\''+c+'\')">'+c+'</button>';
  }).join('');
}
function setFilter(cat){ activeFilter=cat; render(); }

function getFiltered() {
  var q=document.getElementById('searchInput').value.trim().toLowerCase();
  var sort=document.getElementById('sortSelect').value;
  var list=items.slice();
  if (activeFilter!=='Tous') list=list.filter(function(it){return it.cat===activeFilter;});
  if (q) list=list.filter(function(it){return it.name.toLowerCase().indexOf(q)!==-1;});
  if (sort==='name') list.sort(function(a,b){return a.name.localeCompare(b.name);});
  else if (sort==='qty_asc') list.sort(function(a,b){return a.qty-b.qty;});
  else if (sort==='qty_desc') list.sort(function(a,b){return b.qty-a.qty;});
  else if (sort==='status') {
    list.sort(function(a,b){
      var ord={empty:0,low:1,ok:2};
      var ea=getExpiryInfo(a),eb=getExpiryInfo(b);
      var sa=ea&&ea.status==='expired'?-1:ord[getStatus(a)];
      var sb=eb&&eb.status==='expired'?-1:ord[getStatus(b)];
      return sa-sb;
    });
  } else if (sort==='expiry') {
    list.sort(function(a,b){
      var da=a.expiry?new Date(a.expiry):new Date('9999-12-31');
      var db=b.expiry?new Date(b.expiry):new Date('9999-12-31');
      return da-db;
    });
  }
  return list;
}

function render(){ renderPills(); renderAlerts(); renderStats(); renderGrid(); renderPanel(); }

function renderStats() {
  document.getElementById('stat-total').textContent=items.length;
  document.getElementById('stat-low').textContent=items.filter(function(i){return getStatus(i)==='low';}).length;
  document.getElementById('stat-empty').textContent=items.filter(function(i){return getStatus(i)==='empty';}).length;
  document.getElementById('stat-perm').textContent=items.filter(function(i){var ei=getExpiryInfo(i);return ei&&ei.status!=='ok';}).length;
}

function renderAlerts() {
  var zone=document.getElementById('alertsZone');
  var expired=items.filter(function(i){var ei=getExpiryInfo(i);return ei&&ei.status==='expired';});
  var soon=items.filter(function(i){var ei=getExpiryInfo(i);return ei&&ei.status==='soon'&&ei.days<=3;});
  var empty=items.filter(function(i){return getStatus(i)==='empty';});
  var low=items.filter(function(i){return getStatus(i)==='low';});
  var html='';
  if (expired.length) html+='<div class="alert-bar peremption">☠️ <strong>Expirés :</strong> '+expired.map(function(i){return i.emoji+' '+i.name+' ('+fmtDate(i.expiry)+')';}).join(', ')+'</div>';
  if (soon.length)   html+='<div class="alert-bar critical">⏰ <strong>Expirent bientôt :</strong> '+soon.map(function(i){var ei=getExpiryInfo(i);return i.emoji+' '+i.name+' — '+ei.label;}).join(', ')+'</div>';
  if (empty.length)  html+='<div class="alert-bar critical">🚨 <strong>Épuisés :</strong> '+empty.map(function(i){return i.emoji+' '+i.name;}).join(', ')+'</div>';
  if (low.length)    html+='<div class="alert-bar">⚠️ <strong>Stock bas :</strong> '+low.map(function(i){return i.emoji+' '+i.name;}).join(', ')+'</div>';
  zone.innerHTML=html;
}

function renderGrid() {
  var list=getFiltered();
  var grid=document.getElementById('grid');
  if (!list.length){ grid.innerHTML='<div class="empty-state"><div class="big">📦</div><p>Aucun article trouvé.<br>Ajoutez votre premier produit !</p></div>'; return; }
  grid.innerHTML=list.map(function(item){
    var color=getBarColor(item);
    var pct=getBarPct(item);
    var ei=getExpiryInfo(item);
    var permHtml='';
    if (ei) {
      permHtml='<div class="perm-row '+ei.status+'">'+
        '<span class="perm-icon">'+(ei.status==='expired'?'☠️':ei.status==='soon'?'⏰':'✅')+'</span>'+
        '<span class="perm-txt">'+(item.expiryType||'DLC')+' '+fmtDate(item.expiry)+'</span>'+
        '<span class="perm-days">'+ei.label+'</span>'+
      '</div>';
    }
    var bcHtml=item.barcode?'<div class="card-barcode">📊 '+item.barcode+'</div>':'';
    return '<div class="card" style="--bar-color:'+color+'">'+
      '<div class="card-top">'+
        '<span class="card-emoji">'+item.emoji+'</span>'+
        '<div class="card-actions">'+
          '<button class="icon-btn" onclick="openModal('+item.id+')" title="Modifier">✏️</button>'+
          '<button class="icon-btn del" onclick="deleteItem('+item.id+')" title="Supprimer">🗑</button>'+
        '</div>'+
      '</div>'+
      '<div class="card-name">'+item.name+'</div>'+
      '<div class="card-cat">'+item.cat+'</div>'+
      bcHtml+permHtml+
      '<div class="bar-wrap">'+
        '<div class="bar-bg"><div class="bar-fill" style="width:'+pct+'%"></div></div>'+
        '<div class="bar-labels"><span class="qty">'+item.qty+' '+item.unit+'</span><span>max '+item.max+'</span></div>'+
      '</div>'+
      '<div class="stock-ctrl">'+
        '<button class="ctrl-btn" onclick="changeQty('+item.id+',-1)">−</button>'+
        '<div style="text-align:center"><div class="qty-display">'+item.qty+'</div><div class="qty-unit">'+item.unit+'</div></div>'+
        '<button class="ctrl-btn" onclick="changeQty('+item.id+',1)">+</button>'+
        getBadge(item)+
      '</div>'+
    '</div>';
  }).join('');
}

function renderPanel() {
  var need=items.filter(function(i){return getStatus(i)!=='ok';});
  document.getElementById('fabBadge').textContent=need.length;
  var body=document.getElementById('panelBody');
  if (!need.length){ body.innerHTML='<div class="shop-empty">✅ Tous vos stocks sont bons !</div>'; return; }
  body.innerHTML=need.map(function(item){
    var toFill=item.max-item.qty;
    return '<div class="shop-item">'+
      '<input type="checkbox" onchange="this.parentElement.style.opacity=this.checked?.3:1">'+
      '<span class="emoji">'+item.emoji+'</span>'+
      '<span class="name">'+item.name+'</span>'+
      '<span class="need">+'+toFill+' '+item.unit+'</span>'+
    '</div>';
  }).join('');
}

// ── ACTIONS ──
function changeQty(id,delta){
  var it=items.find(function(i){return i.id===id;});
  if (!it) return;
  it.qty=Math.max(0,it.qty+delta);
  save(); render();
}
function deleteItem(id){
  if (!confirm('Supprimer cet article ?')) return;
  items=items.filter(function(i){return i.id!==id;});
  save(); render();
}

// ── MODAL ──
function openModal(id, prefill){
  editingId=id||null;
  var banner=document.getElementById('prefillBanner');
  banner.classList.remove('show');
  if (id) {
    var it=items.find(function(i){return i.id===id;});
    document.getElementById('modalTitle').textContent='Modifier l\'article';
    document.getElementById('fName').value=it.name;
    document.getElementById('fEmoji').value=it.emoji;
    document.getElementById('fCat').value=it.cat;
    document.getElementById('fQty').value=it.qty;
    document.getElementById('fMin').value=it.min;
    document.getElementById('fMax').value=it.max;
    document.getElementById('fUnit').value=it.unit;
    document.getElementById('fBarcode').value=it.barcode||'';
    document.getElementById('fExpiry').value=it.expiry||'';
    document.getElementById('fExpiryType').value=it.expiryType||'';
  } else {
    document.getElementById('modalTitle').textContent=prefill?'✅ Produit identifié':'Nouvel article';
    document.getElementById('fName').value=prefill?prefill.name:'';
    document.getElementById('fEmoji').value=prefill?prefill.emoji:'';
    document.getElementById('fCat').value=prefill?prefill.cat:'Épicerie';
    document.getElementById('fQty').value=1;
    document.getElementById('fMin').value=2;
    document.getElementById('fMax').value=6;
    document.getElementById('fUnit').value=prefill?prefill.unit:'pcs';
    document.getElementById('fBarcode').value=prefill?prefill.barcode:'';
    document.getElementById('fExpiry').value='';
    document.getElementById('fExpiryType').value='DLC';
    if (prefill) {
      document.getElementById('pfIcon').textContent=prefill.emoji||'📦';
      document.getElementById('pfName').textContent=prefill.name||'Produit scanné';
      document.getElementById('pfBrand').textContent=prefill.brand?'🏷 '+prefill.brand:'';
      banner.classList.add('show');
    }
  }
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(function(){ document.getElementById('fName').focus(); },50);
}
function closeModal(){
  document.getElementById('modalOverlay').classList.remove('open');
  editingId=null;
}
function saveItem(){
  var name=document.getElementById('fName').value.trim();
  if (!name){ alert('Le nom est obligatoire.'); return; }
  var data={
    name:name,
    emoji:document.getElementById('fEmoji').value.trim()||'📦',
    cat:document.getElementById('fCat').value,
    qty:parseInt(document.getElementById('fQty').value)||0,
    min:parseInt(document.getElementById('fMin').value)||1,
    max:parseInt(document.getElementById('fMax').value)||5,
    unit:document.getElementById('fUnit').value.trim()||'pcs',
    barcode:document.getElementById('fBarcode').value.trim(),
    expiry:document.getElementById('fExpiry').value,
    expiryType:document.getElementById('fExpiryType').value,
  };
  if (editingId){ Object.assign(items.find(function(i){return i.id===editingId;}),data); }
  else { data.id=Date.now(); items.push(data); }
  save(); render(); closeModal();
}

// ── PANEL ──
function togglePanel(){
  panelOpen=!panelOpen;
  document.getElementById('shoppingPanel').classList.toggle('open',panelOpen);
}
function exportList(){
  var need=items.filter(function(i){return getStatus(i)!=='ok';});
  if (!need.length){ alert('Aucun article à acheter !'); return; }
  var text='🛒 Liste de courses\n\n'+need.map(function(i){return '• '+i.emoji+' '+i.name+' — +'+(i.max-i.qty)+' '+i.unit;}).join('\n');
  navigator.clipboard.writeText(text).then(function(){alert('Liste copiée !');}).catch(function(){alert(text);});
}

// ── SCANNER ──
function openScanner(){
  lastScannedCode=null;
  document.getElementById('scannerOverlay').classList.add('open');
  setScanStatus('','📷 Pointez la caméra vers un code-barres…');
  startQuagga();
}
function closeScanner(){
  stopQuagga();
  document.getElementById('scannerOverlay').classList.remove('open');
}
function setScanStatus(cls, html){
  var el=document.getElementById('scannerStatus');
  el.className='scanner-status'+(cls?' '+cls:'');
  el.innerHTML=html;
}

function startQuagga(){
  if (typeof Quagga==='undefined'){
    setScanStatus('notfound','❌ Bibliothèque scanner non disponible (connexion requise pour le premier chargement).');
    return;
  }
  Quagga.init({
    inputStream:{
      name:'Live',type:'LiveStream',
      target:document.getElementById('scanner-viewport'),
      constraints:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}
    },
    decoder:{readers:['ean_reader','ean_8_reader','upc_reader','upc_e_reader','code_128_reader','code_39_reader']},
    locate:true
  },function(err){
    if (err){ setScanStatus('notfound','❌ Caméra inaccessible : '+(err.message||err)); return; }
    Quagga.start();
    scannerRunning=true;
  });
  Quagga.onDetected(function(result){
    var code=result.codeResult.code;
    if (code && code!==lastScannedCode){
      lastScannedCode=code;
      stopQuagga();
      handleBarcode(code);
    }
  });
}
function stopQuagga(){
  if (scannerRunning){ try{Quagga.stop();}catch(e){} scannerRunning=false; }
}

function handleBarcode(code){
  setScanStatus('','<span class="spinner"></span> Code : <strong>'+code+'</strong> — Identification en cours…');
  var existing=items.find(function(it){return it.barcode===code;});
  if (existing){
    setScanStatus('found','✅ Déjà enregistré : <strong>'+existing.name+'</strong><br>Ouverture pour modification…');
    setTimeout(function(){ closeScanner(); openModal(existing.id); },1200);
    return;
  }
  fetch('https://world.openfoodfacts.org/api/v0/product/'+code+'.json')
    .then(function(r){return r.json();})
    .then(function(data){
      if (data.status===1 && data.product){
        var pf=buildPrefill(data.product, code);
        setScanStatus('found','✅ Identifié : <strong>'+pf.name+'</strong>');
        setTimeout(function(){ closeScanner(); openModal(null,pf); },900);
      } else {
        setScanStatus('notfound','⚠️ Produit inconnu (code : '+code+')<br>Ajout manuel pré-rempli avec le code.');
        setTimeout(function(){ closeScanner(); openModal(null,{name:'',emoji:'📦',cat:'Épicerie',unit:'pcs',barcode:code,brand:''}); },1800);
      }
    })
    .catch(function(){
      setScanStatus('notfound','❌ Pas de réseau ou erreur API.<br>Ajout manuel possible.');
      setTimeout(function(){ closeScanner(); openModal(null,{name:'',emoji:'📦',cat:'Épicerie',unit:'pcs',barcode:code,brand:''}); },1800);
    });
}

function buildPrefill(p, code){
  var name=(p.product_name_fr||p.product_name||p.abbreviated_product_name||'').trim();
  var brand=(p.brands||'').trim();
  var cats=((p.categories_tags||[]).join(' ')+(p.categories||'')).toLowerCase();
  var emoji='📦', cat='Épicerie', unit='pcs';
  if (/lait|yaourt|fromage|beurre|crème|dairy|laitier/.test(cats)){cat='Produits laitiers';emoji='🥛';}
  else if (/fruit|légume|vegeta|produce|salade/.test(cats)){cat='Fruits & Légumes';emoji='🥦';}
  else if (/boisson|eau|jus|soda|drink|beverage/.test(cats)){cat='Boissons';emoji='🧃';unit='L';}
  else if (/viande|poisson|meat|fish|seafood|volaille/.test(cats)){cat='Viandes & Poissons';emoji='🥩';}
  else if (/surgelé|frozen|glace/.test(cats)){cat='Surgelés';emoji='🧊';}
  else if (/boulangerie|pain|bread|biscuit|céréale|viennoiserie/.test(cats)){cat='Boulangerie';emoji='🍞';}
  else if (/hygiène|savon|shampoo|cosmétique|beauté/.test(cats)){cat='Hygiène';emoji='🧴';}
  else if (/entretien|nettoyage|cleaning|lessive/.test(cats)){cat='Entretien';emoji='🧹';}
  else if (/café|thé|coffee|tea/.test(cats)){emoji='☕';}
  else if (/chocolat|confiserie|bonbon|snack/.test(cats)){emoji='🍫';}
  else if (/pâtes|pasta|riz|rice|céréale/.test(cats)){emoji='🍝';}
  else if (/conserve|sauce|condiment|soupe/.test(cats)){emoji='🫙';}
  else if (/fromage|cheese/.test(cats)){emoji='🧀';}
  if (!name && brand) name=brand;
  if (!name) name='Produit '+code;
  return {name:name.substring(0,60),brand:brand,emoji:emoji,cat:cat,unit:unit,barcode:code};
}

function manualBarcode(){
  var code=prompt('Saisir le code-barres manuellement :');
  if (code&&code.trim()){ closeScanner(); handleBarcode(code.trim()); }
}

// ── EVENTS ──
document.getElementById('searchInput').addEventListener('input',render);
document.getElementById('sortSelect').addEventListener('change',render);
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.addEventListener('keydown',function(e){if(e.key==='Escape'){closeModal();closeScanner();}});

// ── NETTOYAGE ANCIENNES VERSIONS ──
// Supprime les clés d'anciennes versions de cette app uniquement
['provisions_v1','provisions_foyer','provisions_sync','provisions_household'].forEach(function(k){
  if (k !== STORAGE_KEY) localStorage.removeItem(k);
});

// ── INIT ──
load();
render();
</script>
